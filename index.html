<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINTID Elite UI</title>

<audio autoplay loop>
    <source src="./anon.mp3" type="audio/mpeg">
</audio>

<style>
body {
    margin: 0;
    font-family: "Courier New", monospace;
    background: black;
    color: #00ff9f;
    overflow-x: hidden;
}

/* MATRIX BACKGROUND */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(0,255,159,0.3);
}

/* HERO */
.hero {
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    font-size: 3rem;
    text-shadow: 0 0 20px #00ff9f;
}

/* BUTTON */
.btn {
    padding: 12px 30px;
    border: 1px solid #00ff9f;
    color: #00ff9f;
    text-decoration: none;
}

.btn:hover {
    background: #00ff9f;
    color: black;
}

/* GLASS PANELS */
.panel {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(0,255,159,0.3);
    backdrop-filter: blur(10px);
    padding: 20px;
    margin: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
}

/* TERMINAL */
.terminal {
    background: black;
    border: 1px solid #00ff9f;
    padding: 20px;
    height: 200px;
    overflow: hidden;
}

/* SCAN BAR */
.scan-bar {
    height: 5px;
    background: #00ff9f;
    animation: scan 2s infinite;
}

@keyframes scan {
    0% {width: 0;}
    100% {width: 100%;}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="nav">
    <div>OSINTID</div>
    <div>
        <a href="https://github.com/DanishKUTE/OSINTID" class="btn">GitHub</a>
    </div>
</div>

<div class="hero">
    <h1>OSINTID</h1>
    <p>Offensive Security Intelligence Framework</p>
    <a href="https://github.com/DanishKUTE/OSINTID" class="btn">Download</a>
</div>

<div class="panel">
    <h2>System Scan</h2>
    <div class="scan-bar"></div>
</div>

<div class="grid">
    <div class="panel">
        <h3>Network Recon</h3>
        <p>Scanning ports...</p>
    </div>
    <div class="panel">
        <h3>OSINT Engine</h3>
        <p>Collecting intelligence...</p>
    </div>
    <div class="panel">
        <h3>IoT Discovery</h3>
        <p>Detecting devices...</p>
    </div>
</div>

<div class="panel">
    <h2>Live Terminal</h2>
    <div class="terminal" id="terminal"></div>
</div>

<script>
// MATRIX RAIN
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff9f";
    ctx.font = fontSize + "px monospace";

    drops.forEach((y, i) => {
        const text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, y * fontSize);

        if (y * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    });
}

setInterval(draw, 33);

// TERMINAL TYPING
const terminal = document.getElementById("terminal");

const lines = [
    "Initializing OSINTID...",
    "Scanning network...",
    "Detecting IoT devices...",
    "Gathering OSINT...",
    "Operation complete."
];

let i = 0;

function typeLine() {
    if (i < lines.length) {
        let line = document.createElement("div");
        terminal.appendChild(line);

        let text = lines[i];
        let j = 0;

        function typeChar() {
            if (j < text.length) {
                line.textContent += text[j];
                j++;
                setTimeout(typeChar, 30);
            }
        }

        typeChar();
        i++;
        setTimeout(typeLine, 1000);
    }
}

typeLine();
</script>

</body>
</html>
