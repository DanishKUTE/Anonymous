<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINTID Web App</title>

<style>
body {
    margin: 0;
    font-family: monospace;
    background: black;
    color: #00ff9f;
}

/* MATRIX */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* NAV */
.nav {
    padding: 15px;
    border-bottom: 1px solid #00ff9f;
}

/* TERMINAL */
.terminal {
    padding: 20px;
}

.output {
    margin-bottom: 10px;
}

input {
    background: black;
    border: none;
    color: #00ff9f;
    width: 100%;
    outline: none;
    font-family: monospace;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="nav">OSINTID Web Interface</div>

<div class="terminal" id="terminal">
    <div class="output">OSINTID initialized...</div>
    <div class="output">Type 'help' to begin</div>
</div>

<input id="input" placeholder="> enter command..." autofocus />

<script>
// MATRIX
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff9f";
    ctx.font = fontSize + "px monospace";

    drops.forEach((y, i) => {
        const text = letters[Math.random()*letters.length|0];
        ctx.fillText(text, i * fontSize, y * fontSize);

        if (y * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }
        drops[i]++;
    });
}
setInterval(draw, 33);

// TERMINAL ENGINE
const input = document.getElementById("input");
const terminal = document.getElementById("terminal");

function print(text) {
    const div = document.createElement("div");
    div.className = "output";
    div.textContent = text;
    terminal.appendChild(div);
    window.scrollTo(0, document.body.scrollHeight);
}

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        const cmd = input.value.trim();
        print("> " + cmd);
        handleCommand(cmd);
        input.value = "";
    }
});

function handleCommand(cmd) {
    const args = cmd.split(" ");

    switch(args[0]) {

        case "help":
            print("Commands:");
            print("scan <ip>");
            print("osint <target>");
            print("clear");
            break;

        case "scan":
            if (!args[1]) return print("Usage: scan <ip>");
            fakeScan(args[1]);
            break;

        case "osint":
            if (!args[1]) return print("Usage: osint <target>");
            fakeOSINT(args[1]);
            break;

        case "clear":
            terminal.innerHTML = "";
            break;

        default:
            print("Unknown command");
    }
}

// FAKE SCAN
function fakeScan(target) {
    print("Scanning " + target + "...");

    setTimeout(()=>print("Port 22: OPEN"), 500);
    setTimeout(()=>print("Port 80: OPEN"), 800);
    setTimeout(()=>print("Port 443: OPEN"), 1100);
    setTimeout(()=>print("Scan complete."), 1500);
}

// FAKE OSINT
function fakeOSINT(target) {
    print("Gathering OSINT on " + target + "...");

    setTimeout(()=>print("Country: Unknown"), 500);
    setTimeout(()=>print("ISP: Hidden Network"), 800);
    setTimeout(()=>print("Reputation: Suspicious"), 1200);
    setTimeout(()=>print("Done."), 1500);
}
</script>

</body>
</html>
